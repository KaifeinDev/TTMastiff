<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ttmastiff">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ttmastiff</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- 前置 Loading：確保使用者在 Flutter 尚未載入前至少看到動畫/文字，避免白畫面 -->
  <div id="preloader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#fff;z-index:9999;">
    <div style="width:44px;height:44px;border:4px solid rgba(0,0,0,0.12);border-top-color:#d32d26;border-radius:50%;animation:spin 0.9s linear infinite;"></div>
    <div style="margin-top:14px;font-family:system-ui,-apple-system,Segoe UI,Roboto;letter-spacing:0.2px;color:#555;font-size:14px;">載入中...</div>
  </div>

  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>

  <script>
    // Flutter 首幀完成後，隱藏前置 Loading。
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('preloader');
      if (el) el.style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
